<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVILLYN Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particles Background -->
    <div id="particles" class="particles-container"></div>

    <!-- Intro Screen -->
    <div id="intro" class="screen active">
        <div class="stars-bg"></div>
        <div class="content">
            <h1 id="name">EVILLYN</h1>
            <p id="message">Welcome to the Galaxy ❤️</p>
            <button id="startBtn" class="btn">Enter</button>
        </div>
    </div>

    <!-- Overlay Screen -->
    <div id="overlay" class="screen">
        <div class="stars-bg"></div>
        <div class="content">
            <h2>Welcome to EVILLYN's World</h2>
            <p>Explore the cosmic experience</p>
            <button id="backBtn" class="btn">Back</button>
        </div>
    </div>

    <!-- Music Control -->
    <audio id="music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" class="music-btn">🔊</button>

    <script src="script.js"></script>
</body>
</html>
